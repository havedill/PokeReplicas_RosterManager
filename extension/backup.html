<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Backup Team · Pokebox</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="backup.css">
</head>
<body class="app-shell">
  <header class="header">
    <div class="brand-lockup">
      <img src="logo.svg" class="brand-logo" width="40" height="40" alt="">
      <div>
        <h1>Backup team</h1>
        <p class="subtitle">Export or restore your Pokebox roster</p>
      </div>
    </div>
  </header>

  <main class="app-main">
    <section class="panel panel-fill">
      <div class="backup-actions">
        <button type="button" class="btn secondary" id="exportBtn">Export JSON</button>
        <label class="btn secondary file-btn">
          Import file
          <input type="file" id="importFile" accept="application/json,.json" hidden>
        </label>
      </div>
      <textarea id="importText" class="import-text scroll-area" placeholder="Or paste exported JSON here"></textarea>
      <button type="button" class="btn primary" id="importBtn">Import from text</button>
      <p id="statusMsg" class="status-msg hidden"></p>
    </section>
  </main>

  <footer class="app-footer">Pokebox · roster syncs via browser storage</footer>

  <script src="roster-utils.js"></script>
  <script src="backup-page.js"></script>
</body>
</html>
